[modules]
left = ["Workspaces","WindowTitle"]
right = ["SystemInfo","Clock",["MediaPlayer","Settings","Tray"]]


[Clock]
format = "%A %d %B %r" 

[appearance]

success_color = "#a6e3a1"
text_color = "#cdd6f4"

workspace_colors = ["#b4befe", "#cba6f7" ]

[appearance.primary_color]
base = "#b4befe"
text = "#1e1e2e"

[appearance.danger_color]
base = "#f38ba8"
weak = "#f9e2af"

[appearance.background_color]
base = "#1e1e2e"
weak = "#313244"
strong = "#45475a"

[appearance.secondary_color]
base = "#11111b"
strong = "#1b1b25"